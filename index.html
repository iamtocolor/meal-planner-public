<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Meal Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF8F4;--white:#FFFFFF;--ink:#1A1814;--muted:#7B766F;
  --border:rgba(26,24,20,0.09);--border-md:rgba(26,24,20,0.16);
  --b-bg:#FFF4E6;--b-txt:#7A4F1E;--b-dot:#E8943A;
  --l-bg:#EAF5EC;--l-txt:#1F5C2E;--l-dot:#3DA64A;
  --s-bg:#FFF0F5;--s-txt:#8A2558;--s-dot:#E05A9D;
  --d-bg:#EDE8FB;--d-txt:#3D2C8A;--d-dot:#6D4FF0;
  --accent:#6D4FF0;--accent-lt:#EDE8FB;--accent-mid:#A58AF5;
  --r:14px;--rs:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--white);border-bottom:1px solid var(--border);height:60px;padding:0 1.75rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:400;letter-spacing:-.4px;display:flex;align-items:center;gap:9px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center}
.month-nav{display:flex;align-items:center;gap:10px}
.nav-btn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border-md);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:15px;transition:all .13s}
.nav-btn:hover{background:var(--cream);color:var(--ink)}
.month-title{font-family:'Fraunces',serif;font-size:16px;font-weight:400;min-width:155px;text-align:center;letter-spacing:-.2px}
.today-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border-md);background:transparent;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .13s}
.today-btn:hover{background:var(--accent-lt);color:var(--accent);border-color:var(--accent-mid)}
.sync-indicator{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#3DA64A}
.sync-dot.syncing{background:var(--accent);animation:spin-dot 1s infinite}
@keyframes spin-dot{0%,100%{opacity:1}50%{opacity:.3}}
.app{display:grid;grid-template-columns:1fr 370px;flex:1;min-height:0}
.cal-side{padding:1.5rem 1.75rem;overflow-y:auto}
.legend{display:flex;gap:1.25rem;margin-bottom:1rem;align-items:center}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.day-hdr{background:var(--white);text-align:center;padding:9px 0;font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.day-cell{background:var(--white);min-height:100px;max-height:100px;padding:9px 8px;cursor:pointer;transition:background .1s;overflow:hidden}
.day-cell:hover{background:#FEFCF9}
.day-cell.is-today{background:#FFFAF4}
.day-cell.other-m{opacity:.38;cursor:default}
.day-cell.selected{background:var(--accent-lt)}
.day-num{font-size:12.5px;color:var(--muted);display:block;margin-bottom:5px;line-height:1}
.day-cell.selected .day-num{color:var(--accent);font-weight:500}
.today-badge{background:var(--accent);color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500}
.pills{display:flex;flex-direction:column;gap:3px;max-height:66px;overflow:hidden}
.pill{font-size:10px;padding:2px 6px;border-radius:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.55}
.pill.b{background:var(--b-bg);color:var(--b-txt)}
.pill.l{background:var(--l-bg);color:var(--l-txt)}
.pill.s{background:var(--s-bg);color:var(--s-txt)}
.pill.d{background:var(--d-bg);color:var(--d-txt)}
.right-panel{border-left:1px solid var(--border);background:var(--white);display:flex;flex-direction:column;height:calc(100vh - 60px);position:sticky;top:60px;overflow:hidden}
.detail-head{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);flex-shrink:0}
.detail-date{font-family:'Fraunces',serif;font-size:22px;font-weight:400;letter-spacing:-.4px;margin-bottom:2px}
.detail-hint{font-size:12.5px;color:var(--muted)}
.detail-body{padding:1.1rem 1.5rem;overflow-y:auto;flex:1}
.meal-row{margin-bottom:1.1rem}
.meal-row-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.meal-row-left{display:flex;align-items:center;gap:7px}
.row-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-label{font-size:10.5px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.del-btn{font-size:11px;color:var(--muted);background:transparent;border:none;cursor:pointer;padding:2px 6px;border-radius:4px;transition:all .12s;opacity:0}
.meal-row:hover .del-btn{opacity:1}
.del-btn:hover{background:#FEE2E2;color:#DC2626}
.meal-val{background:var(--cream);border-radius:var(--rs);padding:10px 12px;font-size:13.5px;line-height:1.55;min-height:40px;display:flex;align-items:center}
.meal-val.empty{color:var(--muted);font-style:italic;font-size:12.5px}
.meal-actions{display:flex;align-items:center;gap:6px}
.save-btn{font-size:11px;color:var(--accent);background:transparent;border:1px solid var(--accent-mid);cursor:pointer;padding:2px 8px;border-radius:12px;transition:all .12s}
.save-btn:hover{background:var(--accent-lt)}
.meal-input{width:100%;background:var(--cream);border:1px solid transparent;border-radius:var(--rs);padding:10px 12px;font-size:13.5px;line-height:1.55;min-height:40px;font-family:'DM Sans',sans-serif;color:var(--ink);resize:vertical;outline:none;transition:border-color .12s,background .12s}
.meal-input::placeholder{color:var(--muted);font-style:italic;font-size:12.5px}
.meal-input:focus{border-color:var(--accent-mid);background:#fff}
.no-date{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13.5px;font-style:italic;text-align:center;padding:2rem}
.chat-wrap{border-top:1px solid var(--border);display:flex;flex-direction:column;max-height:320px;flex-shrink:0}
.chat-hdr{padding:9px 1.5rem;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:1px solid var(--border);flex-shrink:0}
.live-dot{width:6px;height:6px;border-radius:50%;background:#3DA64A;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;padding:10px 18px;border-radius:22px;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap}
.toast.show{opacity:1}
.error-banner{background:#FEE2E2;color:#991B1B;font-size:12.5px;padding:8px 1.75rem;text-align:center;display:none}
.error-banner.show{display:block}
</style>
</head>
<body>

<div class="error-banner" id="errorBanner">
  Could not connect to the server. Make sure your backend is running.
</div>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="14" height="14" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
    </div>
    Our Meal Planner
  </div>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="sync-indicator">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Live</span>
    </div>
    <button class="today-btn" id="todayBtn">Today</button>
    <div class="month-nav">
      <button class="nav-btn" id="prevBtn">&#8249;</button>
      <div class="month-title" id="monthTitle"></div>
      <button class="nav-btn" id="nextBtn">&#8250;</button>
    </div>
  </div>
</header>

<div class="app">
  <div class="cal-side">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--b-dot)"></div>Breakfast</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--l-dot)"></div>Lunch</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--s-dot)"></div>Snacks</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--d-dot)"></div>Dinner</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="right-panel">
    <div class="detail-head">
      <div class="detail-date" id="detailDate">Select a day</div>
      <div class="detail-hint" id="detailHint">Click any date to see your meals</div>
    </div>
    <div class="detail-body" id="detailBody">
      <div class="no-date">Click a date to view breakfast, lunch, snacks and dinner for that day</div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG — replace with your Railway/Render backend URL ──────────────────
const API_BASE = 'https://meal-planner-production-9ec1.up.railway.app'; // e.g. https://meal-planner.railway.app

// ── STATE ─────────────────────────────────────────────────────────────────────
let meals = {};
let curYear, curMonth, selDate;
const today = new Date();
curYear = today.getFullYear();
curMonth = today.getMonth();

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const WDAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function dk(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function todayKey(){ return dk(today.getFullYear(), today.getMonth(), today.getDate()); }
function fmtKey(key){ const [y,m,d]=key.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'}); }

function setSyncing(on){
  const dot=document.getElementById('syncDot');
  const lbl=document.getElementById('syncLabel');
  dot.className='sync-dot'+(on?' syncing':'');
  lbl.textContent=on?'Syncing…':'Live';
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function showError(show){
  document.getElementById('errorBanner').className='error-banner'+(show?' show':'');
}

// ── API ───────────────────────────────────────────────────────────────────────
async function fetchMeals(fromDate, toDate){
  setSyncing(true);
  try{
    const url=`${API_BASE}/api/meals?from=${fromDate}&to=${toDate}`;
    const res=await fetch(url);
    if(!res.ok) throw new Error();
    const data=await res.json();
    // Merge into local meals
    Object.assign(meals, data);
    showError(false);
  }catch{
    showError(true);
  }finally{
    setSyncing(false);
  }
}

async function deleteMeal(date, mealType){
  setSyncing(true);
  try{
    await fetch(`${API_BASE}/api/meals?date=${date}&meal_type=${mealType}`,{method:'DELETE'});
    if(meals[date]) delete meals[date][mealType];
    buildCalendar();
    if(selDate===date){ const [,, d]=date.split('-'); renderDetail(date,parseInt(d)); }
    showToast('Meal removed');
  }catch{ showToast('Failed to delete'); }
  finally{ setSyncing(false); }
}

async function saveMeal(date, mealType, food){
  const value=food.trim();
  if(!value){
    if(meals[date]?.[mealType]) await deleteMeal(date, mealType);
    else showToast('Nothing to save');
    return;
  }

  setSyncing(true);
  try{
    const res=await fetch(`${API_BASE}/api/meals`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date, meal_type:mealType, food:value})
    });
    if(!res.ok) throw new Error();

    if(!meals[date]) meals[date]={};
    meals[date][mealType]=value;
    buildCalendar();
    if(selDate===date){ const [,, d]=date.split('-'); renderDetail(date,parseInt(d)); }
    showToast(`${mealType.charAt(0).toUpperCase()+mealType.slice(1)} saved`);
  }catch{
    showToast('Failed to save meal');
  }finally{
    setSyncing(false);
  }
}

function escHtml(v){
  return String(v)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#39;');
}

function saveMealFromInput(date, mealType){
  const input=document.getElementById(`meal-input-${mealType}`);
  if(!input) return;
  saveMeal(date, mealType, input.value);
}

// ── CALENDAR ──────────────────────────────────────────────────────────────────
function buildCalendar(){
  document.getElementById('monthTitle').textContent=`${MONTHS[curMonth]} ${curYear}`;
  const grid=document.getElementById('calGrid');
  grid.innerHTML='';
  WDAYS.forEach(d=>{ const h=document.createElement('div'); h.className='day-hdr'; h.textContent=d; grid.appendChild(h); });
  const firstDay=new Date(curYear,curMonth,1).getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const prev=new Date(curYear,curMonth,0).getDate();
  for(let i=firstDay-1;i>=0;i--) addCell(grid,prev-i,true,false,null);
  for(let day=1;day<=dim;day++){
    const isT=day===today.getDate()&&curMonth===today.getMonth()&&curYear===today.getFullYear();
    addCell(grid,day,false,isT,dk(curYear,curMonth,day));
  }
  const rem=(7-((firstDay+dim)%7))%7;
  for(let i=1;i<=rem;i++) addCell(grid,i,true,false,null);
}

function addCell(grid,dayNum,otherM,isToday,key){
  const cell=document.createElement('div');
  let cls='day-cell';
  if(otherM) cls+=' other-m';
  if(isToday) cls+=' is-today';
  if(key&&selDate===key) cls+=' selected';
  cell.className=cls;
  const numEl=document.createElement('span');
  numEl.className='day-num';
  numEl.innerHTML=isToday?`<span class="today-badge">${dayNum}</span>`:dayNum;
  cell.appendChild(numEl);
  if(key&&meals[key]){
    const pd=document.createElement('div'); pd.className='pills';
    [['breakfast','b'],['lunch','l'],['snacks','s'],['dinner','d']].forEach(([t,cls])=>{
      if(meals[key][t]){ const p=document.createElement('div'); p.className='pill '+cls; p.textContent=meals[key][t]; pd.appendChild(p); }
    });
    cell.appendChild(pd);
  }
  if(!otherM&&key) cell.addEventListener('click',()=>selectDate(key,dayNum));
  grid.appendChild(cell);
}

function selectDate(key,day){
  selDate=key; buildCalendar(); renderDetail(key,day);
}

function renderDetail(key,day){
  const dateObj=new Date(curYear,curMonth,day);
  document.getElementById('detailDate').textContent=dateObj.toLocaleDateString('en-GB',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('detailHint').textContent=meals[key]&&Object.keys(meals[key]).length?'Meals logged for this day':'No meals logged yet — use the fields above to log meals.';
  const body=document.getElementById('detailBody');
  body.innerHTML='';
  [['breakfast','Breakfast','var(--b-dot)'],['lunch','Lunch','var(--l-dot)'],['snacks','Snacks','var(--s-dot)'],['dinner','Dinner','var(--d-dot)']].forEach(([t,lbl,dot])=>{
    const food=meals[key]?.[t];
    const delBtn=food?`<button class="del-btn" onclick="deleteMeal('${key}','${t}')" title="Remove">✕</button>`:'';
    body.innerHTML+=`<div class="meal-row"><div class="meal-row-hdr"><div class="meal-row-left"><div class="row-dot" style="background:${dot}"></div><div class="row-label">${lbl}</div></div><div class="meal-actions"><button class="save-btn" onclick="saveMealFromInput('${key}','${t}')" title="Save">Save</button>${delBtn}</div></div><textarea id="meal-input-${t}" class="meal-input" rows="2" placeholder="Nothing logged yet">${food?escHtml(food):''}</textarea></div>`;
  });
}

// ── NAV ───────────────────────────────────────────────────────────────────────
async function loadMonthData(){
  const from=dk(curYear,curMonth,1);
  const to=dk(curYear,curMonth,new Date(curYear,curMonth+1,0).getDate());
  await fetchMeals(from,to);
  buildCalendar();
}

document.getElementById('prevBtn').addEventListener('click',async()=>{ if(--curMonth<0){curMonth=11;curYear--;} await loadMonthData(); });
document.getElementById('nextBtn').addEventListener('click',async()=>{ if(++curMonth>11){curMonth=0;curYear++;} await loadMonthData(); });
document.getElementById('todayBtn').addEventListener('click',async()=>{ curYear=today.getFullYear(); curMonth=today.getMonth(); await loadMonthData(); selectDate(todayKey(),today.getDate()); });

// ── AUTO-REFRESH every 30 seconds (picks up WhatsApp-logged meals) ───────────
setInterval(loadMonthData, 30000);

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init(){
  await loadMonthData();
  selectDate(todayKey(),today.getDate());
}
init();
</script>
</body>
</html>
